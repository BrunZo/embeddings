<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ filename }} — Sentence Embeddings</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; height: 100vh; font-family: system-ui, sans-serif; background: #fafafa; }

  #text-panel {
    width: 40%;
    padding: 28px 24px;
    overflow-y: auto;
    border-right: 1px solid #e0e0e0;
    background: #fff;
    font-size: 15px;
    line-height: 1.9;
    color: #222;
  }
  #text-panel .back { display: inline-block; margin-bottom: 16px; color: #5b9bd5; text-decoration: none; font-size: 13px; }
  #text-panel .back:hover { text-decoration: underline; }

  #text-panel h1, #text-panel h2, #text-panel h3,
  #text-panel h4, #text-panel h5, #text-panel h6 {
    margin: 1em 0 0.4em;
    line-height: 1.3;
  }
  #text-panel p { margin: 0.4em 0; }
  #text-panel ul, #text-panel ol { margin: 0.4em 0 0.4em 1.5em; }
  #text-panel blockquote {
    border-left: 3px solid #ccc;
    padding-left: 12px;
    color: #555;
    margin: 0.4em 0;
  }
  #text-panel pre {
    background: #f4f4f4;
    padding: 10px 12px;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 13px;
    margin: 0.6em 0;
  }
  #text-panel code { font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; }
  #text-panel pre code { font-size: 13px; }
  #text-panel hr { border: none; border-top: 1px solid #e0e0e0; margin: 1em 0; }
  #text-panel a { color: #5b9bd5; text-decoration: none; }
  #text-panel a:hover { text-decoration: underline; }

  #text-panel [data-index] {
    cursor: default;
    border-radius: 3px;
    padding: 1px 2px;
    transition: background 0.12s;
  }
  #text-panel [data-index]:hover { background: #ffe082; }
  #text-panel [data-index].active { background: #ffb300; color: #000; }

  .frontmatter {
    background: #f7f7f7;
    border: 1px solid #e6e6e6;
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 12px;
    row-gap: 4px;
  }
  .frontmatter dt { font-weight: 600; color: #555; }
  .frontmatter dd { color: #333; }
  .tag {
    display: inline-block;
    background: #eaf3fb;
    color: #2c6a9a;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 12px;
    margin-right: 4px;
  }
  .alias {
    display: inline-block;
    background: #f3ebf8;
    color: #6b3fa0;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 12px;
    margin-right: 4px;
  }
  .wikilink-broken { color: #b00; text-decoration: line-through dotted; }

  #chart-panel { flex: 1; position: relative; }
  #chart { width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="text-panel">
  <a class="back" href="/">&larr; back</a>
  <div id="md-content">{{ content_html|safe }}</div>
</div>
<div id="chart-panel"><div id="chart"></div></div>

<script>
const POINTS = {{ points | tojson }};

const mdContent = document.getElementById('md-content');

const DEFAULT_COLOR   = '#5b9bd5';
const HIGHLIGHT_COLOR = '#e74c3c';

function defaultColors() {
  return POINTS.map(() => DEFAULT_COLOR);
}

function colorsByBlock(blockIdx) {
  return POINTS.map(p => p.block_indices.includes(blockIdx) ? HIGHLIGHT_COLOR : DEFAULT_COLOR);
}

const trace = {
  x: POINTS.map(p => p.x),
  y: POINTS.map(p => p.y),
  mode: 'markers',
  type: 'scatter',
  text: POINTS.map(p => p.text),
  hoverinfo: 'text',
  marker: {
    color: defaultColors(),
    size: 7,
    line: { width: 0 },
  },
};

const flowArrows = [];
for (let i = 0; i < POINTS.length - 1; i++) {
  flowArrows.push({
    x: POINTS[i + 1].x,
    y: POINTS[i + 1].y,
    ax: POINTS[i].x,
    ay: POINTS[i].y,
    xref: 'x', yref: 'y', axref: 'x', ayref: 'y',
    showarrow: true,
    arrowhead: 3,
    arrowsize: 1,
    arrowwidth: 1,
    arrowcolor: 'rgba(91,155,213,0.35)',
    standoff: 6,
    startstandoff: 6,
  });
}

const layout = {
  margin: { t: 16, r: 16, b: 16, l: 16 },
  paper_bgcolor: '#fafafa',
  plot_bgcolor:  '#fafafa',
  xaxis: { showgrid: false, zeroline: false, showticklabels: false },
  yaxis: { showgrid: false, zeroline: false, showticklabels: false },
  hovermode: 'closest',
  annotations: flowArrows,
};

Plotly.newPlot('chart', [trace], layout, { responsive: true });

const chartDiv = document.getElementById('chart');

function clearActive() {
  mdContent.querySelectorAll('[data-index].active').forEach(el => el.classList.remove('active'));
}

chartDiv.on('plotly_hover', (evt) => {
  const idx = evt.points[0].pointIndex;
  clearActive();
  const indices = POINTS[idx].block_indices;
  let first = null;
  for (const bi of indices) {
    const el = mdContent.querySelector(`[data-index="${bi}"]`);
    if (el) {
      el.classList.add('active');
      if (first === null) first = el;
    }
  }
  if (first) first.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
});

chartDiv.on('plotly_unhover', () => clearActive());

mdContent.addEventListener('mouseover', (e) => {
  const el = e.target.closest('[data-index]');
  if (!el || !mdContent.contains(el)) return;
  const i = parseInt(el.dataset.index);
  Plotly.restyle('chart', { 'marker.color': [colorsByBlock(i)] }, [0]);
});

mdContent.addEventListener('mouseout', (e) => {
  const el = e.target.closest('[data-index]');
  if (!el || !mdContent.contains(el)) return;
  Plotly.restyle('chart', { 'marker.color': [defaultColors()] }, [0]);
});
</script>

</body>
</html>
