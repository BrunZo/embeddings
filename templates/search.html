<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #fafafa;
    display: flex;
    justify-content: center;
    padding: 48px 24px;
  }
  .container { max-width: 640px; width: 100%; }
  h1 { font-size: 22px; margin-bottom: 24px; color: #222; }
  nav { display: flex; gap: 20px; margin-bottom: 28px; border-bottom: 1px solid #e0e0e0; padding-bottom: 12px; }
  nav a { color: #5b9bd5; text-decoration: none; font-size: 14px; font-weight: 500; }
  nav a:hover { text-decoration: underline; }
  nav a.active { color: #222; font-weight: 600; pointer-events: none; }
  textarea {
    width: 100%;
    height: 80px;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #5b9bd5; }
  button {
    margin-top: 10px;
    padding: 8px 20px;
    background: #5b9bd5;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }
  button:hover { background: #4a87c0; }
  .results { margin-top: 32px; }
  .result {
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 12px;
    background: #fff;
  }
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .result-path { font-size: 14px; }
  .result-path a { color: #5b9bd5; text-decoration: none; }
  .result-path a:hover { text-decoration: underline; }
  .result-score {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    margin-left: 12px;
  }
  .result-snippet {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .no-results { color: #888; font-size: 15px; margin-top: 24px; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="/">Tree</a>
    <a href="/search" class="active">Search</a>
  </nav>

  <form method="post">
    <textarea name="q" placeholder="Enter a query…" autofocus>{{ query }}</textarea>
    <button type="submit">Search</button>
  </form>

  {% if query %}
    <div class="results">
      {% if results %}
        {% for r in results %}
          <div class="result">
            <div class="result-header">
              <span class="result-path">
                <strong>{{ loop.index }}.</strong>
                <a href="/visualize/{{ r.path }}">{{ r.path }}</a>
              </span>
              <span class="result-score">score {{ r.score }}</span>
            </div>
            <div class="result-snippet">{{ r.text[:200] }}{% if r.text|length > 200 %}…{% endif %}</div>
          </div>
        {% endfor %}
      {% else %}
        <p class="no-results">No results found.</p>
      {% endif %}
    </div>
  {% endif %}
</div>
</body>
</html>
